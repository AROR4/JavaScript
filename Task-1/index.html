<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Interactive To-Do List</h1>
    <p class="subtitle">Add, complete, and delete your tasks.</p>

    <form class="todo-form" id="todo-form">
      <label class="label" for="task-input">Task</label>
        <input
          id="task-input"
          type="text"
          name="task"
          placeholder="Add task needs to be done?"
          autocomplete="off"
          required
        >
      <button type="submit">Add</button>
    </form>

    <div class="todo-meta">
      <span id="task-count">0 tasks</span>
      <button type="button" class="clear-btn" id="clear-completed">Clear Completed</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>
    <p class="empty-state" id="empty-state">No tasks yet.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
