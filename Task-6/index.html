<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and Drop List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Drag and Drop List Reordering</h1>
    <p>Drag the items below to change their order.</p>

    <ul class="sortable-list" id="sortableList">
      <li class="list-item" draggable="true">Item 1</li>
      <li class="list-item" draggable="true">Item 2</li>
      <li class="list-item" draggable="true">Item 3</li>
      <li class="list-item" draggable="true">Item 4</li>
      <li class="list-item" draggable="true">Item 5</li>
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
